<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhật Ký Bubu Dudu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <button class="nav-btn top-btn pulse-btn" id="add-page-btn">
            <i class="fas fa-plus"></i> Thêm trang mới
        </button>
    </header>

    <main class="container">
        <button class="nav-arrow-paw wobble-btn" id="prev-btn">
            <i class="fas fa-paw"></i>
        </button>

        <div class="diary-book">
            <div class="diary-binding"></div>

            <div class="book-page left-page">
                <div class="page-number top-left" id="page-number-display-left">Page 1</div>
                
                <div class="image-wrapper drop-zone" id="image-drop-zone" title="Kéo thả ảnh vào đây">
                    <div class="image-container-diary">
                        <img id="page-image" src="assets/img/bubu_dudu_concept.png" alt="Ảnh Bubu Dudu">
                    </div>
                    <input type="text" id="edit-image-url" class="hidden custom-input" placeholder="Nhập link ảnh hoặc kéo thả file ảnh vào đây...">
                </div>

                <div class="music-player-diary drop-zone" id="music-drop-zone" title="Kéo thả file nhạc (MP3) vào đây">
                    <button class="music-btn pulse-on-play" id="play-pause-btn">
                        <i class="fas fa-heart"></i>
                    </button>
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                            <div class="progress-seeker" id="progress-seeker"></div>
                        </div>
                    </div>
                    <audio id="page-audio"></audio>
                </div>

                <div class="lyrics-container">
                    <div id="page-lyrics-display" class="lyrics-text">♪ Lời bài hát sẽ hiển thị ở đây... ♪</div>
                    <textarea id="edit-lyrics" class="hidden custom-input lyrics-edit" placeholder="Nhập lời bài hát..."></textarea>
                </div>
            </div>

            <div class="book-page right-page ruled-paper">
                <div class="page-number top-right" id="page-number-display-right">Page 2</div>
                
                <div class="message-container-diary">
                    <div id="page-message-display">Hôm nay hai đứa cùng nhau vẽ tranh...</div>
                    <textarea id="edit-textarea" class="hidden ruled-textarea"></textarea>
                </div>

                <button class="nav-btn edit-btn-diary" id="edit-btn">
                    <i class="fas fa-edit"></i> Chỉnh sửa
                </button>
            </div>
        </div>

        <button class="nav-arrow-paw wobble-btn" id="next-btn">
            <i class="fas fa-paw"></i>
        </button>
    </main>

    <script src="script.js"></script>
</body>
</html>
